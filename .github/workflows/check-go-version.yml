name: Check Go Version

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Get current Go version from go.mod
      id: current
      run: |
        # go.mod is the canonical and only source of truth for the repository's
        # Go version. Workflows derive their version from it via
        # `go-version-file: go.mod`, so there is nothing else to update.
        CURRENT_VERSION=$(grep -E '^go [0-9]' go.mod | awk '{print $2}')
        echo "Current Go version in go.mod: $CURRENT_VERSION"
        echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

    - name: Get latest stable Go version
      id: latest
      run: |
        # Fetch the latest stable Go version from the official releases page.
        LATEST_VERSION=$(curl -s https://go.dev/VERSION?m=text | head -n 1 | sed 's/go//')
        echo "Latest stable Go version: $LATEST_VERSION"
        echo "version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"

    - name: Open a pull request if outdated
      env:
        GH_TOKEN: ${{ github.token }}
        CURRENT_VERSION: ${{ steps.current.outputs.version }}
        LATEST_VERSION: ${{ steps.latest.outputs.version }}
      run: |
        echo "Current: $CURRENT_VERSION"
        echo "Latest: $LATEST_VERSION"

        if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
          echo "Go version is up to date!"
          exit 0
        fi

        echo "Go version is outdated."
        BRANCH="automated/update-go-version-$LATEST_VERSION"

        # Skip if a PR for this exact bump is already open.
        EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
        if [ -n "$EXISTING_PR" ]; then
          echo "PR #$EXISTING_PR already open for branch $BRANCH, skipping."
          exit 0
        fi

        # go.mod is the only place a Go version lives. Update the `go` directive
        # (and the `toolchain` line, if present); workflows need no changes
        # because they read the version from go.mod.
        sed -i -E "s/^go [0-9]+(\.[0-9]+)*$/go $LATEST_VERSION/" go.mod
        sed -i -E "s/^toolchain go[0-9]+(\.[0-9]+)*$/toolchain go$LATEST_VERSION/" go.mod

        git config user.name "Claude Code"
        git config user.email "herve.quiroz+claude@gmail.com"
        git checkout -b "$BRANCH"
        git add go.mod
        git commit -m "Update Go version from $CURRENT_VERSION to $LATEST_VERSION"
        # This branch is exclusively bot-owned and deterministically named per
        # version, so a plain force push is safe and avoids lease failures on a
        # fresh runner that has no remote-tracking ref for it.
        git push --force origin "$BRANCH"

        gh pr create \
          --head "$BRANCH" \
          --base main \
          --title "Update Go version from $CURRENT_VERSION to $LATEST_VERSION" \
          --label "claude" \
          --body "$(cat <<EOF
        A new stable Go version is available, so this PR bumps the canonical Go
        version in \`go.mod\`. Workflows derive their Go version from \`go.mod\`
        via \`go-version-file: go.mod\`, so no other files need to change.

        Current version: $CURRENT_VERSION
        Latest version: $LATEST_VERSION

        \`go.mod\` is the only place a Go version lives in this repository; if you
        add a workflow that needs Go, point \`actions/setup-go\` at \`go.mod\` with
        \`go-version-file: go.mod\` rather than hardcoding a version.

        See the [Go release notes](https://go.dev/doc/devel/release) for details about this version.

        ---
        ✨ Content generated by automated workflow.
        EOF
        )"
